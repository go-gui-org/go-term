name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "7 3 * * 1"  # weekly, Monday 03:07 UTC

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout go-term
        uses: actions/checkout@v4
        with:
          path: go-term

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: go-term/go.sum

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libglib2.0-dev \
            libhunspell-dev

      - name: Vet
        working-directory: go-term
        run: go vet ./...

      - name: Build falcon
        working-directory: go-term
        run: go build ./examples/falcon

      - name: Test
        working-directory: go-term
        run: go test -race -count=1 ./...

  macos-test:
    runs-on: macos-latest
    steps:
      - name: Checkout go-term
        uses: actions/checkout@v4
        with:
          path: go-term

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: go-term/go.sum

      - name: Install system deps
        run: |
          brew install \
            sdl2 \
            freetype \
            harfbuzz \
            pango \
            fontconfig \
            glib \
            hunspell

      - name: Vet
        working-directory: go-term
        run: go vet ./...

      - name: Build falcon
        working-directory: go-term
        run: go build ./examples/falcon

      - name: Test
        working-directory: go-term
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout go-term
        uses: actions/checkout@v4
        with:
          path: go-term

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: go-term/go.sum

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libglib2.0-dev \
            libhunspell-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: go-term
          version: v2.12

  bench-regress:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - name: Checkout go-term
        uses: actions/checkout@v4
        with:
          path: go-term

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: go-term/go.sum

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libglib2.0-dev \
            libhunspell-dev

      - name: Bench regress
        working-directory: go-term
        run: |
          go test -bench=. -count=10 -benchmem -run='^$$' ./term \
            > /tmp/bench-current.txt
          go run ./scripts/benchregress \
            -threshold 30 \
            -base .github/benchmarks/baseline.txt \
            -current /tmp/bench-current.txt

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-regress-output
          path: /tmp/bench-current.txt

  fuzz:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout go-term
        uses: actions/checkout@v4
        with:
          path: go-term

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: go-term/go.sum

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libglib2.0-dev \
            libhunspell-dev

      - name: Fuzz
        working-directory: go-term
        run: |
          for fuzz in FuzzParserFeed FuzzCSIDispatch FuzzOSCDispatch FuzzKittyAPC; do
            go test -fuzz="^${fuzz}$" -fuzztime=120s ./term || exit 1
          done

  fuzz-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout go-term
        uses: actions/checkout@v4
        with:
          path: go-term
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: go-term/go.sum

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libglib2.0-dev \
            libhunspell-dev

      - name: Check parser changes
        id: changed
        working-directory: go-term
        run: |
          git fetch origin main
          if git diff --name-only origin/main...HEAD | grep -q '^term/parser'; then
            echo "fuzz=true" >> "$GITHUB_OUTPUT"
          else
            echo "fuzz=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fuzz (parser, 30s)
        if: steps.changed.outputs.fuzz == 'true'
        working-directory: go-term
        run: |
          for fuzz in FuzzParserFeed FuzzCSIDispatch FuzzOSCDispatch FuzzKittyAPC; do
            go test -fuzz="^${fuzz}$" -fuzztime=30s ./term || exit 1
          done

  bench:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout go-term
        uses: actions/checkout@v4
        with:
          path: go-term

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: go-term/go.sum

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libglib2.0-dev \
            libhunspell-dev

      - name: Bench
        working-directory: go-term
        run: go test -bench=. -count=5 -benchmem ./term | tee bench.txt

      - name: Archive bench results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: go-term/bench.txt

      - name: Generate normalized baseline
        working-directory: go-term
        run: |
          go run ./scripts/benchregress -update < bench.txt \
            > baseline-ci.txt

      - name: Upload CI baseline
        uses: actions/upload-artifact@v4
        with:
          name: bench-baseline-ci
          path: go-term/baseline-ci.txt
