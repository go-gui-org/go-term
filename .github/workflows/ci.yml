name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout go-term
        uses: actions/checkout@v4
        with:
          path: go-term

      - name: Checkout go-glyph
        uses: actions/checkout@v4
        with:
          repository: mike-ward/go-glyph
          path: go-glyph

      - name: Checkout go-gui
        uses: actions/checkout@v4
        with:
          repository: mike-ward/go-gui
          path: go-gui

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Vet
        working-directory: go-term
        run: go vet ./term

      - name: Test
        working-directory: go-term
        run: go test -race -count=1 ./term

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout go-term
        uses: actions/checkout@v4
        with:
          path: go-term

      - name: Checkout go-glyph
        uses: actions/checkout@v4
        with:
          repository: mike-ward/go-glyph
          path: go-glyph

      - name: Checkout go-gui
        uses: actions/checkout@v4
        with:
          repository: mike-ward/go-gui
          path: go-gui

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libglib2.0-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: go-term
          version: v2.12
